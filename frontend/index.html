<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>User App</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>

  <!-- Canvas для градиента -->
  <canvas id="granim-canvas"></canvas>

  <!-- Контейнер приложения -->
  <div class="app-container">
    <h1>Users 👤</h1>
    <input type="text" id="nameInput" placeholder="Введите имя">
    <button id="addBtn">Добавить</button>
    <ul id="usersList"></ul>
  </div>

  <!-- Нижний футер -->
  <footer>Made with ❤️ by Your App</footer>

  <!-- Granim.js (для плавного градиента) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/granim/2.0.0/granim.min.js"></script>

  <!-- Наш JS -->
  <script src="app.js" defer></script>

</body>
</html>
