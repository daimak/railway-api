<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>User App</title>
  <link rel="stylesheet" href="app.css">
</head>
<body>

  <!-- Canvas для градиента -->
  <canvas id="granim-canvas"></canvas>

  <!-- Контейнер приложения -->
  <div class="app-container">
    <h1>Users 👤</h1>

    <!-- Форма добавления -->
    <form id="add-user-form">
      <input id="user-name" type="text" placeholder="Введите имя">
      <button type="submit">Добавить</button>
    </form>

    <!-- Секция пользователей с подписью -->
    <div class="users-section">
      <h2>Пользователи</h2>
      <ul id="usersList"></ul>
    </div>
  </div>

  <footer>Made with ❤️ by Your App</footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/granim/2.0.0/granim.min.js"></script>
  <script src="app.js" defer></script>

</body>
</html>
